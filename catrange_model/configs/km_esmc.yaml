# ============================================================================
# Km prediction — ESM-C embeddings
# ============================================================================
# Same Optuna-tuned hyperparameters as kcat
# ============================================================================

parameter:
  name: km
  n_classes: 6
  bin_edges: [1.0e-14, 1.0e-5, 1.0e-4, 1.0e-3, 1.0e-2, 1.0e-1, 1.0e4]

embedding:
  model: esmc
  feature_split: 1152

data:
  root_dir: data_robust_v1
  dataset_version: data_split_curated_no_OOD_nodups_esmc
  n_folds: 5
  neg_split: [0.95, 0.025, 0.025]
  holdout:
    n_positive: 100
    n_negative: 10
    use_publication_neg_wt_indices: true   # false = random; true = hardcoded publication indices
    neg_wt_indices: [542, 3403, 794, 3136, 1361, 2069, 1023, 244, 561, 2130]  # ESM-C, no-OOD no-dups
  smote:
    enabled: true
    k_neighbors: 5

model:
  n_estimators: 1920
  max_depth: 11
  learning_rate: 0.0021099437081941153
  subsample: 1.0
  colsample_bytree: 0.4604393961508079
  reg_alpha: 1.1182596551965625
  reg_lambda: 14.80330404900776
  objective: "multi:softmax"
  eval_metric: ["mlogloss"]
  n_jobs: 1
  verbosity: 0
  deterministic_histogram: true
  early_stopping_rounds: 10
  class_imbalance_factor: 0.1
  hard_negative_mining:
    enabled: true
    boost_factor: 100.0
    finetune_fraction: 0.2

seed: 42
