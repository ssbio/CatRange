name: CatRange_env_gpu
channels:
  - rapidsai
  - nvidia
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  # Core scientific stack
  - numpy=1.23.5
  - scipy=1.9.3
  - pandas=1.5.3
  - scikit-learn=1.1.3
  - imbalanced-learn=0.8.1
  - joblib=1.2.0
  - matplotlib=3.6.3
  - seaborn=0.11.2
  - openpyxl=3.1.2
  - xlsxwriter=3.0.3
  - xlrd=2.0.1

  # Jupyter
  - ipython=7.33.0
  - notebook=6.5.4
  - jupyterlab=3.6.1

  # RAPIDS
  - cudatoolkit=11.8
  - cudf=23.04
  - cuml=23.04
  - rmm=23.04
  - dask-cuda=23.04
  - dask=2023.3.2
  - distributed=2023.3.2.1

  # PyTorch CUDA stack
  - pytorch=2.4.0
  - pytorch-cuda=11.8
  - torchvision=0.19.0
  - torchaudio=2.4.0

  # Utilities
  - shap
  - texlive-core
  - pip
  

