name: catrange-notebooks-gpu
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip>=23
  - ipykernel
  - jupyterlab
  - notebook
  - nbconvert
  - numpy=1.26.*
  - pandas=2.2.*
  - scipy=1.11.*
  - scikit-learn=1.3.*
  - imbalanced-learn=0.11.*
  - matplotlib=3.8.*
  - seaborn=0.13.*
  - networkx=3.2.*
  - openpyxl=3.1.*
  - xlsxwriter
  - xlrd
  - joblib=1.3.*
  - tqdm
  - pyyaml
  - pytorch=2.4.*
  - torchvision=0.19.*
  - torchaudio=2.4.*
  - pytorch-cuda=11.8
  - xgboost=2.1.*
  - rdkit=2023.09.*
  - pip:
      - fair-esm==2.0.0
      - pacmap==0.6.2
      - optuna==4.4.0
      - papermill==2.6.0
      - shap==0.46.0
      - treelite-runtime==3.2.0
